services:
  # PhD Seminar Platform Web Service
  - type: web
    name: phd-seminar-platform
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_render:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: phd-seminar-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: RENDER_WEB_SERVICE_PYTHON_VERSION
        value: 3.11.7

  # PostgreSQL Database
  - type: postgres
    name: phd-seminar-db
    plan: free
    ipAllowList: []
