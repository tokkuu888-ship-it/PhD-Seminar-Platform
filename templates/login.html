{% extends "base.html" %}

{% block title %}Login - PhD Seminar Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card fade-in">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
                    <h3>Welcome Back</h3>
                    <p class="text-muted">Sign in to access your PhD seminars and progress reports</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1"></i>Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>

                <hr class="my-4">

                <div class="demo-accounts">
                    <h6 class="text-center mb-3">Demo Accounts</h6>
                    <div class="row text-center">
                        <div class="col-4 mb-2">
                            <small class="text-muted">Dean</small><br>
                            <code>dean / admin123</code>
                        </div>
                        <div class="col-4 mb-2">
                            <small class="text-muted">Professor</small><br>
                            <code>prof1 / prof123</code>
                        </div>
                        <div class="col-4 mb-2">
                            <small class="text-muted">Student</small><br>
                            <code>student1 / student123</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
